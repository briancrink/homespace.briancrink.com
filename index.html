<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="icon" href="shared/images/icons/favicon.png" type="image/png" media="(prefers-color-scheme: light)">
  <link rel="icon" href="shared/images/icons/favicon-white.png" type="image/png" media="(prefers-color-scheme: dark)">
  <link rel="apple-touch-icon" href="shared/images/icons/apple-touch-icon.png">
  <link rel="apple-touch-icon" href="shared/images/icons/apple-touch-icon-dark.png" media="(prefers-color-scheme: dark)">
  <title>Home Space | Brian Crink</title>
</head>
<body>
  <style>
    body {
        background: #000000;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.4s;
        opacity: 0;
        animation: fadeIn 1.3s forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .container {
      text-align: center;
      margin-top: 100px;
    }

    .dev-image {
      width: 100%;
      max-width: 420px;
      height: auto;
      margin-bottom: 40px;
      opacity: 0.95;
    }

    .name {
      font-size: 3.0rem;
      font-weight: 600;
      color: #ffffff;
      margin: 0 0 15px 0;
      letter-spacing: -0.5px;
    }

    .name-link {
      color: inherit;
      text-decoration: none;
      cursor: pointer;
      transition: opacity 0.2s ease;
    }
    
    .name-link:hover {
      opacity: 0.85;
    }

    .status {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 40px;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255, 255, 255, 0.023);
      border-radius: 9999px;
      padding: 8px 20px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      width: fit-content;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background-color: #1784d1;
      border-radius: 50%;
      flex-shrink: 0;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { 
        opacity: 1; 
        transform: scale(1);
      }
      50% { 
        opacity: 0.35; 
        transform: scale(0.85);
      }
    }

    .status-text-wrapper {
      display: flex;
      align-items: center;
      overflow: visible;
      width: 0;
    }

    .status-text {
      color: #1784d1;
      font-family: ui-monospace, "SF Mono", Menlo, Monaco, "Courier New", monospace;
      white-space: nowrap;
      display: inline-block;
      flex-shrink: 0;
      min-height: 1em;
      line-height: 1;
    }

    .cursor {
      width: 2px;
      height: 1em;
      background-color: #1784d1;
      flex-shrink: 0;
      animation: blink-caret 0.75s step-end infinite;
      animation-delay: 0.1s;
      animation-fill-mode: forwards;
      margin-left: 4px;
    }

    @keyframes blink-caret {
      from, to { opacity: 0; }
      50% { opacity: 1; }
    }
  </style>

  <div class="container">
    <h1 class="name"><a href="https://briancrink.com" class="name-link">Brian Crink</a></h1>
    
    <div class="status">
      <div class="status-pill">
        <span class="status-dot"></span>
        
        <div class="status-text-wrapper">
          <span class="status-text"></span>
          <span class="cursor"></span>
        </div>
      </div>
    </div>

    <img src="shared/images/illustration/developer.jpg" alt="Software Developer" class="dev-image" draggable="false">
  </div>

  <script>
    function typeWriter(element, text, speed = 85) {
      return new Promise((resolve) => {
        element.textContent = '';
        let i = 0;

        const interval = setInterval(() => {
          if (i < text.length) {
            element.textContent += text.charAt(i);
            i++;
          } else {
            clearInterval(interval);
            resolve();
          }
        }, speed);
      });
    }

    async function startTypewriter() {
      const wrapper = document.querySelector('.status-text-wrapper');
      const statusText = document.querySelector('.status-text');
      if (!wrapper || !statusText) return;

      const fullText = "Planned Development";

      const measurer = document.createElement('span');
      measurer.style.position = 'absolute';
      measurer.style.visibility = 'hidden';
      measurer.style.whiteSpace = 'nowrap';
      measurer.style.font = getComputedStyle(statusText).font;
      measurer.textContent = fullText;
      document.body.appendChild(measurer);

      const textWidth = measurer.offsetWidth;
      document.body.removeChild(measurer);

      const extraSpaceForCursor = 14;
      wrapper.style.width = `${textWidth + extraSpaceForCursor}px`;

      await typeWriter(statusText, fullText, 85);
    }

    function restartTypewriter() {
      const statusText = document.querySelector('.status-text');
      if (!statusText) return;

      startTypewriter().then(() => {
        setTimeout(restartTypewriter, 5000);
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(restartTypewriter, 300);
    });
  </script>

</body>
</html>

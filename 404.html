<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="icon" href="shared/images/icons/favicon.png" type="image/png" media="(prefers-color-scheme: light)">
  <link rel="icon" href="shared/images/icons/favicon-white.png" type="image/png" media="(prefers-color-scheme: dark)">
  <link rel="apple-touch-icon" href="shared/images/icons/apple-touch-icon.png">
  <link rel="apple-touch-icon" href="shared/images/icons/apple-touch-icon-dark.png" media="(prefers-color-scheme: dark)">
  <title>404 - briancrink.com</title>
</head>
<body>
  <style>
    body {
        background: #000000;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.4s;
        opacity: 0;
        animation: fadeIn 1.3s forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .container {
      text-align: center;
      margin-top: -60px
    }

    .name {
      font-size: 3.0rem;
      font-weight: 600;
      color: #ffffff;
      margin: 0 0 15px 0;
      letter-spacing: -0.5px;
    }

    .name-link {
      color: inherit;
      text-decoration: none;
      cursor: pointer;
      transition: opacity 0.2s ease;
    }
    
    .name-link:hover {
      opacity: 0.85;
    }

    .status {
      color: #666666;
      font-size: 1rem;
      margin: 0;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
  </style>

  <div class="container">
    <p class="status">404</p>
    <h1 class="name"><a href="https://briancrink.com" class="name-link">Brian Crink</a></h1>
  </div>

</body>
</html>
